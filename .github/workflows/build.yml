name: Build Tauri App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm install

      # 手动构建前端（跨平台兼容）
      - name: Build frontend (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path app/api) { Rename-Item app/api .api_backup }
          npx next build
          if (Test-Path .api_backup) { Rename-Item .api_backup api; Move-Item api app/api }

      - name: Build frontend (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mv app/api .api_backup || true
          npx next build
          mv .api_backup app/api || true

      # 构建 Tauri（跳过 beforeBuildCommand，前端已构建）
      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SKIP_DEVSERVER_CHECK: true

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        run: npx tauri build --target ${{ matrix.target }}

      # 上传构建产物
      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

      # Tag 推送时自动创建 GitHub Release 并上传安装包
      - name: Create Release (macOS)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Create Release (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
